<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Anyonic braiding at ν = 1/3 — slides</title>
<link rel="stylesheet" href="vendor/katex/katex.min.css">
<style>
  :root{ --ink:#111; --sub:#666; --hair:#e2e2e2; --accent:#1565c0; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:#222;                       /* letterbox surround */
    font-family:"Helvetica Neue",Arial,"Segoe UI",sans-serif;
    color:var(--ink); overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  /* fixed 16:9 stage, scaled to fit the window by JS */
  #stage{
    position:relative; width:1280px; height:720px;
    background:#fff; transform-origin:center center;
    box-shadow:0 0 40px rgba(0,0,0,.4);
  }
  .slide{ position:absolute; inset:0; display:none; padding:54px 72px 52px; }
  .slide.on{ display:flex; flex-direction:column; }

  /* content slide */
  .slide-title{
    font-size:30px; font-weight:600; line-height:1.15; letter-spacing:-.01em;
    padding-bottom:12px; border-bottom:1px solid var(--hair); flex:0 0 auto;
  }
  .slide-sub{ font-size:18px; color:var(--sub); margin-top:10px; font-weight:400; flex:0 0 auto; }
  .figwrap{ position:relative; flex:1 1 auto; min-height:0; display:flex; align-items:center; justify-content:center; margin-top:14px; overflow:hidden; }
  .figwrap iframe{ position:absolute; top:50%; left:50%; transform-origin:center center; border:0; background:transparent; }
  .figwrap img{ max-width:100%; max-height:100%; object-fit:contain; }
  .figwrap svg{ max-width:100%; max-height:100%; }
  .figwrap .ph{ color:#bbb; font-size:18px; font-style:italic; }

  /* step captions revealed one-by-one */
  .steps{ flex:0 0 auto; margin-top:12px; display:flex; flex-direction:column; gap:6px; }
  .steps .step{
    font-size:20px; color:#222; line-height:1.3;
    opacity:0; transform:translateY(4px); transition:opacity .12s, transform .12s;
  }
  .steps .step.show{ opacity:1; transform:none; }
  .steps .step::before{ content:"▸ "; color:var(--accent); }

  /* footer */
  .foot{
    position:absolute; left:72px; right:72px; bottom:24px;
    display:flex; justify-content:space-between; align-items:flex-end;
    font-size:13px; color:var(--sub); letter-spacing:.02em;
  }

  /* cover */
  .cover{ justify-content:center; padding:0 96px; }
  .cover .eyebrow{ font-size:16px; color:var(--sub); letter-spacing:.12em; text-transform:uppercase; }
  .cover h1{ font-size:48px; font-weight:600; line-height:1.12; letter-spacing:-.015em; margin:22px 0 26px; max-width:1040px; }
  .cover .cite{ font-size:20px; color:#333; }
  .cover .meta{ font-size:16px; color:var(--sub); margin-top:42px; }

  /* divider */
  .divider{ justify-content:center; padding:0 96px; }
  .divider .kicker{ font-size:16px; color:var(--sub); letter-spacing:.12em; text-transform:uppercase; }
  .divider h2{ font-size:52px; font-weight:600; letter-spacing:-.015em; margin-top:14px; }

  #hint{ position:fixed; bottom:8px; left:50%; transform:translateX(-50%);
    color:#888; font-size:12px; font-family:Arial,sans-serif; }
</style>
</head>
<body>
<div id="stage"></div>
<div id="hint">← / → · wheel · F fullscreen · <span id="hud"></span></div>

<script src="vendor/katex/katex.min.js"></script>
<script src="vendor/katex/contrib/auto-render.min.js"></script>
<script>
// ============================================================================
// deck definition. LaTeX note: backslashes MUST be doubled in these JS strings
//   ( '$\\theta$' not '$\theta$' — '\t' would become a TAB ).
// fig:  {kind:'iframe'|'img'|'svg', src?, html?}     steps: [ 'caption html', ... ]
// ============================================================================
const V = '../viz/';          // viz embeds (chrome hidden via ?embed=fig)
const F = '../figures/';      // rendered paper figures
const R = '../ref-crops/';    // extracted crops

const DECK = [
  { type:'cover',
    eyebrow:'PH49903 · Interferometers and Fractional Particles',
    title:'Direct Observation of Anyonic Braiding Statistics at the ν = 1/3 Fractional Quantum Hall State',
    cite:'Nakamura, Liang, Gardner & Manfra · Nature Physics 16, 931 (2020) · arXiv:2006.14115',
    meta:'[Presenter] · 2026' },

  // ---- Part 1 : Recall -----------------------------------------------------
  { type:'divider', section:'Recall', kicker:'Part 1 · ~1 min', title:'Recall' },

  { type:'content', section:'Recall',
    title:'Fractional Braiding Statistics of Laughlin Quasiparticles',
    fig:{ kind:'iframe', src:V+'concepts/a1-braiding.html?embed=fig', w:820, h:480 },
    steps:[
      'Exchange two quasiparticles once $\\;\\to\\; e^{i\\theta_{\\mathrm{ex}}}$',
      'Braiding = encircle = two exchanges $\\;\\to\\; e^{i2\\theta_{\\mathrm{ex}}}$ (path-independent)',
      '$\\nu=1/3:\\;\\; \\theta_{\\mathrm{ex}}=\\pi/3 \\;\\Rightarrow\\; \\theta_{\\mathrm{braid}}=2\\pi/3$',
    ] },

  { type:'content', section:'Recall',
    title:'Laughlin Quasiparticles',
    fig:{ kind:'svg', html:`<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue,Arial,sans-serif">
      <circle cx="240" cy="185" r="160" fill="#eaf2fb" stroke="#2b4a6f" stroke-width="2"/>
      <text x="240" y="370" text-anchor="middle" font-size="16" fill="#2b4a6f">ν = 1/3 incompressible liquid</text>
      <g fill="#1a2330">
        <circle cx="160" cy="105" r="4"/><circle cx="220" cy="90" r="4"/><circle cx="300" cy="115" r="4"/>
        <circle cx="350" cy="165" r="4"/><circle cx="360" cy="210" r="4"/><circle cx="330" cy="250" r="4"/>
        <circle cx="290" cy="305" r="4"/><circle cx="220" cy="325" r="4"/><circle cx="150" cy="295" r="4"/>
        <circle cx="110" cy="205" r="4"/><circle cx="120" cy="145" r="4"/><circle cx="190" cy="245" r="4"/>
        <circle cx="265" cy="150" r="4"/><circle cx="170" cy="195" r="4"/><circle cx="245" cy="255" r="4"/>
      </g>
      <!-- braiding path: quasiparticle B encircles quasihole A -->
      <ellipse cx="210" cy="200" rx="86" ry="62" fill="none" stroke="#1565c0" stroke-width="2.5" stroke-dasharray="7 5"/>
      <path d="M296 196 l8 4 -8 4 z" fill="#1565c0"/>
      <!-- quasihole A -->
      <circle cx="210" cy="200" r="15" fill="#fff" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="4 3"/>
      <text x="210" y="205" text-anchor="middle" font-size="15" fill="#c0392b" font-weight="700">+</text>
      <!-- quasiparticle B on the loop -->
      <circle cx="296" cy="200" r="9" fill="#1565c0"/>
      <text x="296" y="178" text-anchor="middle" font-size="13" fill="#1565c0">qp</text>
      <!-- legend -->
      <g font-size="16" fill="#222">
        <circle cx="476" cy="96" r="4" fill="#1a2330"/><text x="492" y="101">electron</text>
        <circle cx="476" cy="140" r="11" fill="#fff" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="4 3"/>
        <text x="496" y="145">quasihole&#160;&#160;(e* = e/3)</text>
        <path d="M462 184 a14 10 0 1 1 0.1 0" fill="none" stroke="#1565c0" stroke-width="2.5" stroke-dasharray="6 4"/>
        <text x="496" y="189">braid = encircle = 2 exchanges</text>
      </g>
      <text x="468" y="240" font-size="22" fill="#1565c0" font-weight="700">→ statistical phase 2π/3</text>
    </svg>` },
    steps:[
      'Laughlin state $\\;\\Psi_m=\\prod_{i&lt;j}(z_i-z_j)^m\\,e^{-\\sum_k|z_k|^2/4\\ell_B^2}\\;$ (m = 3)',
      'Quasihole at $\\eta:\\;\\prod_i (z_i-\\eta)\\,\\Psi_m\\;\\Rightarrow\\;$ fractional charge $e^*=e/3$',
      'Braiding two quasiholes $\\;\\Rightarrow\\;$ statistical phase $2\\pi/3$',
    ] },

  { type:'content', section:'Recall',
    title:'Quantum Hall Interferometer — Weak Backscattering',
    fig:{ kind:'iframe', src:V+'device/b1-device-edge.html?embed=fig', w:760, h:540 },
    steps:[
      'Chiral edge channels carry the current along the boundary',
      'Two QPCs weakly backscatter ($R\\ll 1$), defining two paths',
      'The two backscattered paths interfere $\\;\\to\\;$ conductance oscillates',
    ] },

  // ---- Part 2 : Device Design ---------------------------------------------
  { type:'divider', section:'Device Design', kicker:'Part 2 · ~1 min', title:'Device Design' },

  { type:'content', section:'Device Design',
    title:'Two Backscattering Paths: Phase Difference',
    fig:{ kind:'iframe', src:V+'prototypes/p-derivation-twopath.html?embed=fig&row=1', w:934, h:440 },
    steps:[
      'Amplitudes $r_1$ (QPC1) and $r_2$ (QPC2)',
      'Enclosed flux $\\to$ Aharonov–Bohm phase $\\;\\theta_{AB}=2\\pi\\frac{e^*}{e}\\frac{A_I B}{\\Phi_0}$',
      'Enclosed anyons $\\to$ braiding phase $\\;N_{\\mathrm{qp}}\\,\\theta_{\\mathrm{anyon}}$',
      'Total $\\;\\theta=\\theta_{AB}+N_{\\mathrm{qp}}\\,\\theta_{\\mathrm{anyon}}$',
    ] },

  { type:'content', section:'Device Design',
    title:'From Interference to Conductance',
    fig:{ kind:'iframe', src:V+'prototypes/p-derivation-phasor.html?embed=fig&row=1', w:834, h:360 },
    steps:[
      '$r=r_1+r_2\\,e^{i\\theta}$',
      '$R=|r|^2=r_1^2+r_2^2+2r_1r_2\\cos\\theta$',
      '$G=G_0(1-R)\\;\\Rightarrow\\;\\delta G\\propto\\cos\\theta$',
      '$N_{\\mathrm{qp}}\\to N_{\\mathrm{qp}}+1$ shifts the fringe — a phase slip',
    ] },

  // ---- Part 3 : Interpretation of Results ---------------------------------
  { type:'divider', section:'Results', kicker:'Part 3 · Interpretation of Results', title:'Interpretation of Results' },

  { type:'content', section:'Results · Phase slips',
    title:'Discrete Phase Slips: Measurement vs. Simulation',
    fig:{ kind:'iframe', src:V+'prototypes/p-compare-sidebyside.html?embed=fig', w:1000, h:430 },
    steps:[
      'Left: measured $\\delta G(B,\\delta V_g)$ (Fig 2). Right: thermal-average model',
      'Same diagonal fringes, same discrete phase slips',
    ] },

  { type:'content', section:'Results · Phase slips',
    title:'Slices & Oscillations',
    fig:{ kind:'iframe', src:V+'prototypes/p-slice-measured.html?embed=fig', w:820, h:670 },
    steps:[
      'Horizontal cut: $\\delta G$ vs $B$ oscillates (AB period)',
      'Vertical cut: $\\delta G$ vs $\\delta V_g$ oscillates',
      'Periods set the enclosed area $A_I$ and $e^*/e$',
    ] },

  { type:'content', section:'Results · Phase slips',
    title:'Phase Jumps = Anyonic Phase',
    fig:{ kind:'iframe', src:V+'prototypes/p-slice-measured.html?embed=fig', w:820, h:670 },
    steps:[
      'Across a positive-slope line, one quasiparticle is removed ($N_{\\mathrm{qp}}\\to N_{\\mathrm{qp}}-1$ as $B$ increases)',
      'The interference phase jumps by $\\;\\theta_{\\mathrm{anyon}}=2\\pi/3$',
      'Measured $\\Delta\\theta/2\\pi = 0.31\\pm0.04 \\;\\Rightarrow\\; \\theta_{\\mathrm{anyon}}=2\\pi/3$',
    ] },

  { type:'content', section:'Results · Phase slips',
    title:'Meaning of the Slopes',
    fig:{ kind:'iframe', src:V+'prototypes/p-slice-measured.html?embed=fig', w:820, h:670 },
    steps:[
      'Iso-phase lines: $\\;$ negative slope $\\;\\to\\;$ continuous AB term',
      'Phase-jump cross-sections: $\\;$ positive slope $\\;\\to\\;$ discrete anyon term',
    ] },

  { type:'content', section:'Results · Phase slips',
    title:'Control: ν = 1 Shows No Phase Slips',
    fig:{ kind:'img', src:F+'supp-fig6.png' },
    steps:[
      '$\\nu=1$ fermions: $\\;\\theta_{\\mathrm{fermion}}=2\\pi\\;$ (trivial)',
      'Only negative-slope AB fringes — no discrete jumps',
      'Decisive control: the jumps are an anyon effect',
    ] },

  { type:'content', section:'Results · Temperature',
    title:'Temperature Dependence: Dephasing',
    fig:{ kind:'img', src:F+'fig4.png' },
    steps:[
      '$\\delta G \\sim e^{-T/T_0}$ — coherence falls with $T$',
      'Central ($\\nu$ fixed): edge thermal smearing (dwell time) $\\Rightarrow T_0\\approx 94$ mK ≈ prediction',
    ] },

  { type:'content', section:'Results · Temperature',
    title:'Topological Dephasing',
    fig:{ kind:'iframe', src:V+'measurements/c4-temperature.html?embed=fig', w:760, h:420 },
    steps:[
      'High/low field: many quasiparticles fill the bulk; $N_{\\mathrm{qp}}$ thermally fluctuates',
      'Topological dephasing $\\Rightarrow T_0\\approx 31$–$32$ mK, far below the $\\sim\\!85$ mK predicted (~3×)',
      'A non-local effect of anyonic statistics — no direct edge–bulk interaction',
    ] },

  // ---- Summary -------------------------------------------------------------
  { type:'content', section:'Summary',
    title:'Summary',
    fig:{ kind:'img', src:R+'measured_fig2.png' },
    steps:[
      'Anyonic braiding phase $\\;2\\pi/3\\;$ directly observed',
      'Discrete phase slips in $\\delta G(B,\\delta V_g)$ — the smoking gun',
      'Robust against the $\\nu=1$ control and temperature checks',
    ] },

  // ---- Backup --------------------------------------------------------------
  { type:'divider', section:'Backup', kicker:'Auxiliary', title:'Backup' },

  { type:'content', section:'Backup',
    title:'Transition: Constant Filling → Constant Density',
    fig:{ kind:'iframe', src:V+'concepts/a3-dos-regimes.html?embed=fig', w:760, h:440 } },

  { type:'content', section:'Backup',
    title:'Experimental Details',
    fig:{ kind:'iframe', src:V+'device/b2-layer-stack.html?embed=fig', w:520, h:560 },
    steps:[ 'Screening-well heterostructure suppresses Coulomb-dominated charging' ] },
];

// ============================================================================
// render
// ============================================================================
const stage = document.getElementById('stage');
const N = DECK.length;

function figHTML(fig){
  if(!fig) return '';
  if(fig.kind==='iframe') return `<iframe data-src="${fig.src}" data-w="${fig.w||900}" data-h="${fig.h||500}" scrolling="no"></iframe>`;
  if(fig.kind==='img')    return `<img src="${fig.src}" alt="">`;
  if(fig.kind==='svg')    return fig.html||'';
  return '';
}
function stepsHTML(steps){
  if(!steps||!steps.length) return '';
  return '<div class="steps">' + steps.map(s=>`<div class="step">${s}</div>`).join('') + '</div>';
}
function foot(i, section){
  return `<div class="foot"><span>${section||''}</span><span class="pn">${i+1} / ${N}</span></div>`;
}

DECK.forEach((s,i)=>{
  const el=document.createElement('section');
  if(s.type==='cover'){
    el.className='slide cover';
    el.innerHTML=`<div class="eyebrow">${s.eyebrow||''}</div><h1>${s.title}</h1>`
      +`<div class="cite">${s.cite||''}</div><div class="meta">${s.meta||''}</div>`;
  }else if(s.type==='divider'){
    el.className='slide divider';
    el.innerHTML=`<div class="kicker">${s.kicker||''}</div><h2>${s.title}</h2>`+foot(i,'');
  }else{
    el.className='slide content';
    el.innerHTML=`<h2 class="slide-title">${s.title}</h2>`
      +(s.sub?`<div class="slide-sub">${s.sub}</div>`:'')
      +`<div class="figwrap">${figHTML(s.fig)||'<span class="ph">(figure)</span>'}</div>`
      +stepsHTML(s.steps)
      +foot(i,s.section);
  }
  stage.appendChild(el);
});

// render LaTeX across the whole deck (all slides already in the DOM)
if(window.renderMathInElement) renderMathInElement(stage,{
  delimiters:[
    {left:'$$',right:'$$',display:true},
    {left:'\\[',right:'\\]',display:true},
    {left:'$',right:'$',display:false},
    {left:'\\(',right:'\\)',display:false},
  ], throwOnError:false,
});

// ============================================================================
// navigation (slide + step)
// ============================================================================
const slides=[...stage.children];
const stepCount = DECK.map(s => (s.type==='content' && s.steps) ? s.steps.length : 0);
const hud=document.getElementById('hud');
let si=0, st=0;

function lazyload(i){
  const fr = slides[i].querySelector('iframe[data-src]');
  if(fr){ fr.src=fr.getAttribute('data-src'); fr.removeAttribute('data-src'); }
}
function scaleFig(el){
  const fr = el.querySelector('.figwrap iframe'); if(!fr) return;
  const box = fr.parentElement;
  const W=+fr.dataset.w||900, H=+fr.dataset.h||500;
  const k=Math.min(box.clientWidth/W, box.clientHeight/H);
  fr.style.width=W+'px'; fr.style.height=H+'px';
  fr.style.transform='translate(-50%,-50%) scale('+k+')';
}
function render(){
  slides.forEach((el,k)=>el.classList.toggle('on',k===si));
  const steps=slides[si].querySelectorAll('.step');
  steps.forEach((e,k)=>e.classList.toggle('show',k<st));
  lazyload(si);
  scaleFig(slides[si]);
  const stepInfo = stepCount[si] ? `  ·  ${st}/${stepCount[si]}` : '';
  hud.textContent = `slide ${si+1} / ${N}${stepInfo}`;
  location.hash = '#'+(si+1);
}
function goSlide(n){ si=Math.max(0,Math.min(N-1,n)); st=0; render(); }
function next(){
  if(st<stepCount[si]) st++;
  else if(si<N-1){ si++; st=0; }
  render();
}
function prev(){
  if(st>0) st--;
  else if(si>0){ si--; st=stepCount[si]; }
  render();
}
function fit(){
  const s=Math.min(window.innerWidth/1280, window.innerHeight/720);
  stage.style.transform='scale('+s+')';
}
addEventListener('resize', fit);
addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){ next(); e.preventDefault(); }
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){ prev(); e.preventDefault(); }
  else if(e.key==='Home'){ goSlide(0); }
  else if(e.key==='End'){ goSlide(N-1); }
  else if(e.key==='f'||e.key==='F'){ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
});
stage.addEventListener('click', e=>{ if(e.clientX < window.innerWidth*0.25) prev(); else next(); });

// mouse-wheel / trackpad: one gesture = one step (jitter threshold + cooldown)
let wheelLock=false;
addEventListener('wheel', e=>{
  if(Math.abs(e.deltaY)<8) return;
  e.preventDefault();
  if(wheelLock) return;
  wheelLock=true;
  (e.deltaY>0?next:prev)();
  setTimeout(()=>{ wheelLock=false; }, 380);
}, { passive:false });

// expose for headless layout testing
window.__deck = { goSlide, next, prev, get si(){return si;}, get st(){return st;}, N };

const startSlide = (parseInt((location.hash||'').replace('#',''))||1) - 1;
fit(); goSlide(startSlide);
</script>
</body>
</html>
