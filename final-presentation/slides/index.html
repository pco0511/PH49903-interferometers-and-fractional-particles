<title>Anyonic braiding at ν = 1/3 — slides</title>
<link rel="stylesheet" href="vendor/katex/katex.min.css">
<style>
  :root{ --ink:#111; --sub:#666; --hair:#e2e2e2; --accent:#1565c0; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:#222;                       /* letterbox surround */
    font-family:"Helvetica Neue",Arial,"Segoe UI",sans-serif;
    color:var(--ink); overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  /* fixed 16:9 stage, scaled to fit the window by JS.
     flex:none -> never let the flexbox shrink the 1280px width (that squished it). */
  #stage{
    position:relative; width:1280px; height:720px; flex:none;
    background:#fff; transform-origin:center center;
    box-shadow:0 0 40px rgba(0,0,0,.4);
  }
  .slide{ position:absolute; inset:0; display:none; padding:54px 72px 52px; }
  .slide.on{ display:flex; flex-direction:column; }

  /* content slide */
  .slide-title{
    font-size:30px; font-weight:600; line-height:1.15; letter-spacing:-.01em;
    padding-bottom:12px; border-bottom:1px solid var(--hair); flex:0 0 auto;
  }
  .slide-sub{ font-size:18px; color:var(--sub); margin-top:10px; font-weight:400; flex:0 0 auto; }

  .figwrap{ position:relative; flex:1 1 auto; min-height:0; display:flex; align-items:center; justify-content:center; margin-top:14px; overflow:hidden; }
  .figwrap iframe{ position:absolute; top:50%; left:50%; transform-origin:center center; border:0; background:transparent; }
  .figwrap img{ max-width:100%; max-height:100%; object-fit:contain; }
  .figwrap svg{ max-width:100%; max-height:100%; }
  .figwrap canvas.customfig{ max-width:100%; max-height:100%; background:#fff; }
  .figwrap .ph{ color:#bbb; font-size:18px; font-style:italic; }

  /* multi-column layout */
  .cols{ flex:1 1 auto; min-height:0; display:flex; gap:28px; margin-top:14px; }
  .cols .col{ flex:1 1 0; min-width:0; display:flex; flex-direction:column; }
  .cols .col .figwrap{ margin-top:0; }
  .cols .col .colbody{ flex:0 0 auto; margin-top:10px; font-size:18px; line-height:1.45; }
  /* 6-up grid (summary) */
  .cols.grid{ display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:1fr 1fr; gap:12px 18px; }
  .cols.grid .col .colbody{ font-size:13px; color:var(--sub); margin-top:4px; text-align:center; }
  /* summary: nudge rows down (top 40px, bottom 20px); Fig 4 also shrunk to 60% */
  .cols.grid .col:nth-child(1) .figwrap,
  .cols.grid .col:nth-child(2) .figwrap,
  .cols.grid .col:nth-child(3) .figwrap{ transform:translateY(40px); }
  .cols.grid .col:nth-child(4) .figwrap,
  .cols.grid .col:nth-child(5) .figwrap{ transform:translateY(20px); }
  .cols.grid .col:nth-child(6) .figwrap{ transform:translateY(20px) scale(0.6); }
  /* tight: fixed-height figure box so the equation sits right under the figure */
  .cols.tight .col{ justify-content:center; }
  .cols.tight .figwrap{ flex:0 0 auto; height:230px; }
  .cols.tight .colbody{ margin-top:14px; text-align:center; font-size:15px; }
  /* slide-4 two-column: figures top-aligned, equations/labels directly under each */
  .cols.cols4 .col{ justify-content:flex-start; position:relative; }
  .cols.cols4 .col:first-child{ flex:1.55 1 0; }   /* widen interferometer column */
  .cols.cols4 .col:nth-child(2){ transform:translateY(40px); }   /* drop backscattering figure+text down */
  .cols.cols4 .col:first-child .figwrap{ transform:translateX(50px); overflow:visible; }  /* nudge interferometer right */
  .cols.cols4 .figwrap{ flex:0 0 auto; height:400px; }
  .cols.cols4 .colbody{ margin-top:12px; text-align:center; font-size:22px; line-height:1.4; }
  .cols.cols4 .colbody .cap{ font-weight:600; color:#1a2330; font-size:21px; margin:12px 0 3px; }
  /* left block (caption+formulas): pinned to bottom, grows upward over the figure */
  .cols.cols4 .col:first-child .colbody{ position:absolute; left:0; right:0; bottom:0; margin-top:0; }
  /* slide-5: interferometer carried from slide 4 at identical size/position; standalone class for later tweaks */
  .cols.cols5 .col{ justify-content:flex-start; position:relative; }
  .cols.cols5 .col:first-child{ flex:1.55 1 0; }
  .cols.cols5 .col:first-child .figwrap{ flex:0 0 auto; height:400px; transform:translateX(50px); overflow:visible; }
  /* right column: phase-difference equation, vertically centered */
  .cols.cols5 .col:nth-child(2){ justify-content:center; }
  .cols.cols5 .col:nth-child(2) .figwrap{ display:none; }
  .cols.cols5 .col:nth-child(2) .colbody{ margin-top:0; text-align:center; font-size:21px; }
  /* slide-6: interferometer (left, carried from slide 5) + Fig 2 measured slices (right) */
  .cols.cols6 .col{ justify-content:flex-start; position:relative; }
  .cols.cols6 .col:first-child{ flex:1.55 1 0; }
  .cols.cols6 .col:first-child .figwrap{ flex:0 0 auto; height:400px; transform:translateX(50px); overflow:visible; }
  .cols.cols6 .col:nth-child(2) .figwrap{ flex:0 0 auto; height:400px; transform:scale(1.25); overflow:visible; }
  /* slide-6 live controls (drive the interferometer area via postMessage) */
  .cols.cols6 .col:first-child .colbody{ margin-top:0; }
  .cols.cols6 .liveui{ transform:translateX(50px); width:300px; margin:18px auto 0; display:flex; flex-direction:column; gap:13px; }
  .cols.cols6 .liveui .lrow{ display:flex; align-items:center; gap:14px; }
  .cols.cols6 .liveui .lk{ width:30px; text-align:right; font-size:20px; color:#1a2330; }
  .cols.cols6 .liveui .lsl{ flex:1 1 auto; accent-color:#2b6fb0; cursor:pointer; }
  /* slide-7: only the Fig 2 joint plot carried from slide 6 (right column) at identical size/position */
  .cols.cols7 .col{ justify-content:flex-start; position:relative; }
  .cols.cols7 .col:first-child{ flex:1.55 1 0; }
  .cols.cols7 .col:first-child .figwrap{ display:none; }
  .cols.cols7 .col:nth-child(2) .figwrap{ flex:0 0 auto; height:400px; transform:translateY(-10px) scale(1.25); overflow:visible; }  /* nudge so the arrow band clears the title rule and the heatmap sits a touch lower */
  .cols.cols7 .col:first-child{ justify-content:center; }
  .cols.cols7 .col:first-child .colbody{ margin-top:0; }
  .cols.cols7 .s7text{ font-size:21px; color:#1a2330; max-width:540px; margin:0 auto; }
  .cols.cols7 .s7text .katex-display{ margin:2px 0 24px; text-align:left; }
  .cols.cols7 .s7list{ list-style:none; margin:0 0 18px; padding:0; display:flex; flex-direction:column; gap:11px; }
  .cols.cols7 .s7list:last-child{ margin-bottom:0; }
  .cols.cols7 .s7list li{ position:relative; padding-left:22px; line-height:1.4; }
  .cols.cols7 .s7list li::before{ content:"▸"; position:absolute; left:0; color:var(--accent); }

  /* slide 8 — same right-figure geometry as slide 7 (joint plot carried over, identical size/position) */
  .cols.cols8 .col{ justify-content:flex-start; position:relative; }
  .cols.cols8 .col:first-child{ flex:1.55 1 0; justify-content:center; }
  .cols.cols8 .col:first-child .figwrap{ flex:0 0 auto; height:400px; overflow:visible; transform:translate(-28px,-48px) scale(0.8); }
  .cols.cols8 .col:first-child .colbody{ margin-top:0; }
  .cols.cols8 .col:nth-child(2) .figwrap{ flex:0 0 auto; height:400px; transform:translateY(-10px) scale(1.25); overflow:visible; }

  /* slide 9 — fig3-b carried from slide 8 (left, identical geometry), fig4.png on the right */
  .cols.cols9 .col{ justify-content:flex-start; position:relative; }
  .cols.cols9 .col:first-child{ flex:1.55 1 0; justify-content:center; }
  .cols.cols9 .col:first-child .figwrap{ flex:0 0 auto; height:400px; overflow:visible; transform:translate(-28px,-48px) scale(0.8); }
  .cols.cols9 .col:first-child .colbody{ margin-top:0; }
  .cols.cols9 .col:nth-child(2){ justify-content:center; }
  .cols.cols9 .col:nth-child(2) .figwrap{ flex:0 0 auto; height:420px; overflow:visible; }

  /* steps: all shown at once (no sequential reveal) */
  .steps{ flex:0 0 auto; margin-top:12px; display:flex; flex-direction:column; gap:6px; }
  .steps .step{ font-size:20px; color:#222; line-height:1.35; }
  .steps .step::before{ content:"▸ "; color:var(--accent); }

  /* footer */
  .foot{
    position:absolute; left:72px; right:72px; bottom:24px;
    display:flex; justify-content:space-between; align-items:flex-end;
    font-size:13px; color:var(--sub); letter-spacing:.02em;

  .slide-cite{
    position:absolute; left:72px; right:72px; bottom:46px;
    font-size:13px; color:var(--sub); line-height:1.35;

  .slide-eqn{ position:absolute; display:inline-block; }
  .slide-eqn .katex-display{ margin:0; }
  .slide-eqn.eqn-s9{ left:96px; bottom:104px; font-size:25px; }   /* slide 9: lower-left, clearly visible */

  .laserdot{ position:absolute; width:20px; height:20px; margin:-10px 0 0 -10px; border-radius:50%;
    background:radial-gradient(circle at 50% 50%, rgba(233,55,37,.95), rgba(233,55,37,.6) 58%, rgba(233,55,37,0) 70%);
    box-shadow:0 0 0 2px rgba(255,255,255,.92), 0 0 16px 6px rgba(233,55,37,.5);   /* white ring = visible on any background */

  .cover .eyebrow{ font-size:16px; color:var(--sub); letter-spacing:.12em; text-transform:uppercase; }

  .cover .meta{ font-size:15px; color:var(--sub); margin-top:14px; }

  .divider .kicker{ font-size:16px; color:var(--sub); letter-spacing:.12em; text-transform:uppercase; }
  .divider h2{ font-size:52px; font-weight:600; letter-spacing:-.015em; margin-top:14px; }

  .toc{ justify-content:center; padding:0 110px; }
  .toc .kicker{ font-size:16px; color:var(--sub); letter-spacing:.12em; text-transform:uppercase; }
  .toc h2{ font-size:46px; font-weight:600; letter-spacing:-.015em; margin:0 0 38px; }
  .toc .toclist{ list-style:none; counter-reset:toc; display:flex; flex-direction:column; max-width:980px; }

    display:flex; align-items:baseline; gap:28px; padding:20px 4px; border-top:1px solid var(--hair); }
  .toc .toclist li:last-child{ border-bottom:1px solid var(--hair); }
  .toc .toclist li::before{ content:counter(toc,decimal-leading-zero); color:var(--accent);
    font-size:22px; font-weight:700; font-variant-numeric:tabular-nums; min-width:48px; }

  #hint{ position:fixed; bottom:8px; left:50%; transform:translateX(-50%);
    color:#888; font-size:12px; font-family:Arial,sans-serif; }
</style>

// ============================================================================
// render
// ============================================================================
const stage = document.getElementById('stage');
const N = DECK.length;

const CUSTOM={}; let _uid=0;          // custom canvas figures: id -> init(canvas)->{stop}
function figHTML(fig){
  if(!fig) return '<span class="ph">(figure)</span>';
  if(fig.kind==='iframe') return `<iframe data-src="${fig.src}" data-w="${fig.w||900}" data-h="${fig.h||500}" scrolling="no"></iframe>`;
  if(fig.kind==='img')    return `<img src="${fig.src}" alt="">`;
  if(fig.kind==='svg')    return fig.html||'';
  if(fig.kind==='custom'){ const id='cf'+(_uid++); CUSTOM[id]=fig.init;
    return `<canvas class="customfig" id="${id}" width="${fig.w||600}" height="${fig.h||440}"></canvas>`; }
  return '';
}
function stepsHTML(steps){
  if(!steps||!steps.length) return '';
  return '<div class="steps">' + steps.map(s=>`<div class="step">${s}</div>`).join('') + '</div>';
}
function colsHTML(cols, grid, mod){
  return `<div class="cols${grid?' grid':''}${mod?' '+mod:''}">` + cols.map(c=>
    `<div class="col"><div class="figwrap">${figHTML(c.fig)}</div>`
    + (c.body?`<div class="colbody">${c.body}</div>`:'') + `</div>`).join('') + `</div>`;
}
// cover: a row of real figures (iframes scaled like .figwrap; img sizes itself). H drives box width.
const COVH=192;
function coverFigsHTML(figs){
  return `<div class="coverfigs">` + figs.map(c=>{
    const box = c.fig.kind==='iframe'
      ? `<div class="figbox" style="width:${Math.round(COVH*c.fig.w/c.fig.h)}px;height:${COVH}px">${figHTML(c.fig)}</div>`
      : `<div class="figbox" style="height:${COVH}px">${figHTML(c.fig)}</div>`;
    return `<div class="covercell">${box}` + (c.cap?`<div class="covercap">${c.cap}</div>`:'') + `</div>`;
  }).join('') + `</div>`;
}
function foot(i, section){
  return `<div class="foot"><span>${section||''}</span><span class="pn">${i+1} / ${N}</span></div>`;
}

DECK.forEach((s,i)=>{
  const el=document.createElement('section');
  if(s.type==='cover'){
    el.className='slide cover';
    el.innerHTML=`<div class="eyebrow">${s.eyebrow||''}</div><h1>${s.title}</h1>`
      +`<div class="cite">${s.cite||''}</div>`
      +(s.coverFigs?coverFigsHTML(s.coverFigs):(s.figSvg?`<div class="coverfig">${s.figSvg}</div>`:''))
      +`<div class="meta">${s.meta||''}</div>`;
  }else if(s.type==='divider'){
    el.className='slide divider';
    el.innerHTML=`<div class="kicker">${s.kicker||''}</div><h2>${s.title}</h2>`+foot(i,'');
  }else if(s.type==='toc'){
    el.className='slide toc';
    el.innerHTML=(s.kicker?`<div class="kicker">${s.kicker}</div>`:'')+`<h2>${s.title||''}</h2>`
      +`<ol class="toclist">`+(s.items||[]).map(it=>`<li>${it}</li>`).join('')+`</ol>`+foot(i,'');
  }else{
    el.className='slide content';
    const bodyHTML = s.cols ? colsHTML(s.cols, s.grid, s.colsMod)
      : `<div class="figwrap">${figHTML(s.fig)}</div>`+stepsHTML(s.steps);
    el.innerHTML=`<h2 class="slide-title">${s.title}</h2>`
      +(s.sub?`<div class="slide-sub">${s.sub}</div>`:'')
      +bodyHTML
      +(s.eqn?`<div class="slide-eqn ${s.eqnMod||''}">${s.eqn}</div>`:'')
      +(s.cite?`<div class="slide-cite">${s.cite}</div>`:'')
      +foot(i,s.section);
  }
  stage.appendChild(el);
});

// render LaTeX across the whole deck (all slides already in the DOM)
if(window.renderMathInElement) renderMathInElement(stage,{
  delimiters:[
    {left:'$$',right:'$$',display:true},
    {left:'\\[',right:'\\]',display:true},
    {left:'$',right:'$',display:false},
    {left:'\\(',right:'\\)',display:false},
  ], throwOnError:false,
});

// slide-6 live interferometer: sliders -> device iframe (postMessage); keep clicks off the nav
(function(){
  const ui=stage.querySelector('.cols6 .liveui');
  const fr=stage.querySelector('.cols6 .col:first-child iframe');
  const sB=document.getElementById('s6_B'), sV=document.getElementById('s6_Vg');
  if(!ui||!fr||!sB||!sV) return;
  const send=()=>{ try{ fr.contentWindow&&fr.contentWindow.postMessage(
    {type:'live', B:+sB.value, Vg:+sV.value}, '*'); }catch(e){} };
  fr.addEventListener('load', send);                 // push initial state once the device boots
  const onInput=()=>{ send(); if(window.__deckBC) window.__deckBC.postMessage({type:'s6', B:+sB.value, Vg:+sV.value}); };
  sB.addEventListener('input', onInput); sV.addEventListener('input', onInput);
  window.__applyS6=(B,Vg)=>{ sB.value=B; sV.value=Vg; send(); };   // remote apply (value set doesn't fire input -> no echo)
  ['click','mousedown','pointerdown','wheel','keydown'].forEach(ev=>
    ui.addEventListener(ev, e=>e.stopPropagation()));
})();

// ============================================================================
// navigation (slide-to-slide; all text shown at once)
// ============================================================================
const slides=[...stage.children];
const hud=document.getElementById('hud');
let si=0, _stops=[];
const IS_PREVIEW = new URLSearchParams(location.search).has('nosync');   // presenter preview iframe: no self-navigation

function lazyload(i){
  slides[i].querySelectorAll('iframe[data-src]').forEach(fr=>{
    fr.src=fr.getAttribute('data-src'); fr.removeAttribute('data-src');
  });
}
function scaleFig(el){
  el.querySelectorAll('.figwrap iframe, .coverfigs iframe').forEach(fr=>{
    const box=fr.parentElement;
    const W=+fr.dataset.w||900, H=+fr.dataset.h||500;
    const k=Math.min(box.clientWidth/W, box.clientHeight/H);
    fr.style.width=W+'px'; fr.style.height=H+'px';
    fr.style.transform='translate(-50%,-50%) scale('+k+')';
  });
}
function render(){
  _stops.forEach(s=>{ try{ s&&s(); }catch(e){} }); _stops=[];   // stop prev animations
  slides.forEach((el,k)=>el.classList.toggle('on',k===si));
  lazyload(si);
  scaleFig(slides[si]);
  // re-fit iframes once async images settle (grid `1fr` rows reflow after images load, which would otherwise leave iframes scaled to the pre-reflow row height and clipped)
  const cur=slides[si];
  requestAnimationFrame(()=>scaleFig(cur));
  setTimeout(()=>scaleFig(cur), 250);
  cur.querySelectorAll('img').forEach(im=>{ if(!im.complete) im.addEventListener('load', ()=>scaleFig(cur), {once:true}); });
  slides[si].querySelectorAll('canvas.customfig').forEach(cv=>{
    const init=CUSTOM[cv.id]; if(init){ const r=init(cv); if(r&&r.stop) _stops.push(r.stop); }
  });
  hud.textContent = `slide ${si+1} / ${N}`;
  location.hash = '#'+(si+1);
}
function go(n){ si=Math.max(0,Math.min(N-1,n)); render(); }
function fit(){
  const s=Math.min(window.innerWidth/1280, window.innerHeight/720);
  stage.style.transform='scale('+s+')';
}
addEventListener('resize', fit);
addEventListener('keydown', e=>{
  if(IS_PREVIEW) return;                                   // preview iframes never self-navigate
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){ go(si+1); e.preventDefault(); }
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){ go(si-1); e.preventDefault(); }
  else if(e.key==='Home'){ go(0); }
  else if(e.key==='End'){ go(N-1); }
  else if(e.key==='f'||e.key==='F'){ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
  else if(e.key==='p'||e.key==='P'){ window.open('presenter.html'+(location.hash||''), 'presenter', 'width=1180,height=760'); }
});
stage.addEventListener('click', e=>{ if(IS_PREVIEW) return; if(e.clientX < window.innerWidth*0.25) go(si-1); else go(si+1); });

// mouse-wheel / trackpad: one gesture = one slide (jitter threshold + 50 ms cooldown)
let wheelLock=false;
addEventListener('wheel', e=>{
  if(IS_PREVIEW) return;
  if(Math.abs(e.deltaY)<8) return;
  e.preventDefault();
  if(wheelLock) return;
  wheelLock=true;
  go(si + (e.deltaY>0?1:-1));
  setTimeout(()=>{ wheelLock=false; }, 50);
}, { passive:false });

// expose for headless layout testing
window.__deck = { go, get si(){return si;}, N };

// ---- presenter sync: mirror navigation + live interactions + laser pointer across same-origin windows ----
// Navigation is broadcast only by real decks; the presenter's `?nosync` preview iframes still relay
// interactions and the pointer so the room stays live, but never drive slide changes themselves.
(function(){
  if(IS_PREVIEW){ const h=document.getElementById('hint'); if(h) h.style.display='none'; }
  if(!window.BroadcastChannel) return;
  const bc=new BroadcastChannel('phaseslip-deck');
  window.__deckBC=bc;                                                                 // slide-6 sliders broadcast through this

  if(!IS_PREVIEW){                                                                    // navigation sync (real decks only)
    const baseGo=go; let applying=false;
    go=n=>{ baseGo(n); if(!applying) bc.postMessage({type:'nav', si}); };
    window.__navApply=n=>{ applying=true; baseGo(n); applying=false; };
  }

  let dot=null;                                                                        // laser pointer overlay
  function showDot(x,y,on){
    if(!on){ if(dot) dot.style.display='none'; return; }
    if(!dot){ dot=document.createElement('div'); dot.className='laserdot'; stage.appendChild(dot); }
    dot.style.display='block'; dot.style.left=(x*1280)+'px'; dot.style.top=(y*720)+'px';
  }
  const sliceFrames=()=>[...stage.querySelectorAll('iframe')]
    .filter(f=>((f.getAttribute('src')||f.getAttribute('data-src')||'').includes('p-slice-measured')));
  window.addEventListener('message',ev=>{ const d=ev.data;                            // a slice viz reports a user drag
    if(d&&d.type==='slice') bc.postMessage({type:'slice', B:d.B, V:d.V}); });

  bc.onmessage=e=>{ const d=e.data; if(!d) return;
    if(d.type==='nav'){ if(!IS_PREVIEW && window.__navApply && d.si!==si) window.__navApply(d.si); }
    else if(d.type==='point'){ showDot(d.x, d.y, d.on); }
    else if(d.type==='s6'){ if(window.__applyS6) window.__applyS6(d.B, d.Vg); }
    else if(d.type==='slice'){ sliceFrames().forEach(f=>{ try{ f.contentWindow.postMessage({type:'sliceSet', B:d.B, V:d.V}, '*'); }catch(_){} }); }
  };
})();

const startSlide = (parseInt((location.hash||'').replace('#',''))||1) - 1;
fit(); go(startSlide);
</script>
